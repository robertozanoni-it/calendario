<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind - Resizable UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #ffffff; 
            --bg-col-left: #f8fafc;
            --bg-col-right: #f1f5f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-main: #020617;
            --bg-col-left: #111827;
            --bg-col-right: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-light: #1e1b4b;
            --border: #334155;
        }

        /* Badge Categories */
        .badge-appti { background: #6366f1; }
        .badge-casa { background: #f59e0b; }
        .badge-disdire { background: #ef4444; }
        .badge-famiglia { background: #f97316; }
        .badge-kate { background: #a855f7; }
        .badge-lavoro { background: #3b82f6; }
        .badge-mattia { background: #ec4899; }
        .badge-pagare { background: #dc2626; }
        .badge-personale { background: #10b981; }
        .badge-riscuotere { background: #8b5cf6; }
        .badge-salute { background: #059669; }
        .badge-tel { background: #06b6d4; }
        .badge-tasse { background: #475569; } /* Nuova categoria Tasse */

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            user-select: none; /* Previene selezione testo durante il resize */
        }

        /* Layout Grid con Resizer */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Colonne */
        .col-archive {
            width: 300px;
            min-width: 200px;
            max-width: 500px;
            background: var(--bg-col-left);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .col-work {
            flex-grow: 1;
            background: var(--bg-main);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .col-dash {
            width: 320px;
            min-width: 250px;
            max-width: 500px;
            background: var(--bg-col-right);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        /* Elementi Resizer (Maniglie) */
        .resizer {
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
            transition: background 0.3s;
            margin: 0 -3px; /* Sovrappone leggermente i bordi */
        }
        .resizer:hover, .resizer.resizing {
            background: var(--primary);
            opacity: 0.3;
        }

        .workspace-container { width: 100%; max-width: 650px; user-select: auto; }

        .section-title {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.05em;
        }

        /* Creation Elements */
        .creation-box {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }
        .stat-card .val { font-size: 1.4rem; font-weight: 800; display: block; }
        .stat-card .lab { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

        input, select, textarea {
            background: var(--bg-col-left);
            border: 1px solid var(--border);
            padding: 0.7rem;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.85rem;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        .btn-sec {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            text-align: center;
        }

        .task-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-start;
            user-select: auto;
        }
        .task-card.priority-high { border-left: 4px solid var(--danger); }
        .task-card.priority-med { border-left: 4px solid var(--warning); }
        .task-card.priority-low { border-left: 4px solid var(--success); }
        .task-card.completed { opacity: 0.5; filter: grayscale(0.5); }

        .badge { font-size: 0.5rem; font-weight: 800; color: white; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; }
        .task-title { font-weight: 700; font-size: 0.8rem; line-height: 1.2; }
        
        .search-container { margin-bottom: 1rem; }
        #full-list { flex: 1; overflow-y: auto; padding-right: 5px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body data-theme="light">

    <div class="app-container" id="main-container">
        <!-- ARCHIVIO SINISTRA -->
        <section class="col-archive" id="left-col">
            <div class="search-container">
                <div class="section-title">
                    <span>📦 Archivio</span>
                    <span id="full-count">0</span>
                </div>
                <input type="text" id="search-input" placeholder="Cerca..." oninput="render()">
            </div>
            <div id="full-list"></div>
        </section>

        <!-- RESIZER 1 -->
        <div class="resizer" id="resizer-left"></div>

        <!-- WORKSPACE CENTRO -->
        <section class="col-work" id="center-col">
            <div class="workspace-container">
                <header style="text-align: center; margin-bottom: 1.5rem;">
                    <h1 style="font-weight: 800; color: var(--primary); font-size: 1.3rem;">OmniMind Lite</h1>
                    <p id="date-display" style="font-size: 0.75rem; color: var(--text-muted);"></p>
                </header>

                <div class="creation-box">
                    <div class="section-title">✨ Nuova Attività</div>
                    <input type="text" id="entry-text" placeholder="Cosa dobbiamo fare oggi?">
                    
                    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px;">
                        <select id="entry-category">
                            <option value="App.ti">Appuntamenti</option>
                            <option value="Casa">Casa</option>
                            <option value="disdire">Disdire</option>
                            <option value="Famiglia">Famiglia</option>
                            <option value="Kate">Kate</option>
                            <option value="Lavoro">Lavoro</option>
                            <option value="Mattia">Mattia</option>
                            <option value="Pagare">Pagare</option>
                            <option value="Personale">Personale</option>
                            <option value="Riscuotere">Riscuotere</option>
                            <option value="Salute">Salute</option>
                            <option value="Tasse">Tasse</option>
                            <option value="Tel">Telefono / Call</option>
                        </select>
                        <input type="date" id="entry-date">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <select id="entry-priority">
                            <option value="low">Priorità Bassa</option>
                            <option value="med">Priorità Media</option>
                            <option value="high">Priorità Alta</option>
                        </select>
                        <select id="entry-recur">
                            <option value="none">Nessuna</option>
                            <option value="daily">Ogni Giorno</option>
                            <option value="weekly">Settimanale</option>
                            <option value="monthly">Mensile</option>
                        </select>
                    </div>

                    <textarea id="entry-notes" style="height: 60px;" placeholder="Note..."></textarea>
                    <button class="btn-main" onclick="addEntry()">Salva Attività</button>
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
                    <button class="btn-sec" onclick="toggleTheme()">🌓 Tema</button>
                    <button class="btn-sec" onclick="exportBackup()">💾 Esporta</button>
                    <button class="btn-sec" onclick="document.getElementById('importInput').click()">📂 Importa</button>
                    <button class="btn-sec" onclick="window.print()">🖨️ Stampa</button>
                    <input type="file" id="importInput" style="display:none" accept=".json" onchange="importBackup(event)">
                </div>
            </div>
        </section>

        <!-- RESIZER 2 -->
        <div class="resizer" id="resizer-right"></div>

        <!-- DASHBOARD DESTRA -->
        <section class="col-dash" id="right-col">
            <div class="section-title">
                <span>🔥 Oggi</span>
                <span id="today-count" class="badge" style="background: var(--primary);">0</span>
            </div>
            <div id="today-list"></div>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                <div class="section-title">📊 Stats</div>
                <div class="stat-card">
                    <span class="lab">Completate</span>
                    <span class="val" id="stats-done">0</span>
                </div>
                <div class="stat-card">
                    <span class="lab">Produttività</span>
                    <span class="val" id="stats-perc">0%</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const KEY = 'omnimind_resizable_v1';
        let state = { entries: [], theme: 'light', layout: { left: 300, right: 320 } };

        // --- GESTIONE RESIZER ---
        function initResizers() {
            const leftResizer = document.getElementById('resizer-left');
            const rightResizer = document.getElementById('resizer-right');
            const leftCol = document.getElementById('left-col');
            const rightCol = document.getElementById('right-col');
            const container = document.getElementById('main-container');

            let isResizingLeft = false;
            let isResizingRight = false;

            leftResizer.addEventListener('mousedown', (e) => {
                isResizingLeft = true;
                leftResizer.classList.add('resizing');
            });

            rightResizer.addEventListener('mousedown', (e) => {
                isResizingRight = true;
                rightResizer.classList.add('resizing');
            });

            document.addEventListener('mousemove', (e) => {
                if (isResizingLeft) {
                    const newWidth = e.clientX;
                    if (newWidth > 200 && newWidth < 500) {
                        leftCol.style.width = newWidth + 'px';
                        state.layout.left = newWidth;
                    }
                }
                if (isResizingRight) {
                    const newWidth = window.innerWidth - e.clientX;
                    if (newWidth > 250 && newWidth < 500) {
                        rightCol.style.width = newWidth + 'px';
                        state.layout.right = newWidth;
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizingLeft || isResizingRight) {
                    isResizingLeft = false;
                    isResizingRight = false;
                    leftResizer.classList.remove('resizing');
                    rightResizer.classList.remove('resizing');
                    save(); // Salva anche le dimensioni
                }
            });
        }

        function init() {
            try {
                const saved = localStorage.getItem(KEY);
                if (saved) state = JSON.parse(saved);
            } catch(e) {}
            
            document.body.setAttribute('data-theme', state.theme || 'light');
            
            // Ripristina dimensioni colonne
            if(state.layout) {
                document.getElementById('left-col').style.width = (state.layout.left || 300) + 'px';
                document.getElementById('right-col').style.width = (state.layout.right || 320) + 'px';
            }

            document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
            
            initResizers();
            render();
        }

        function save() {
            localStorage.setItem(KEY, JSON.stringify(state));
            render();
        }

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', state.theme);
            save();
        }

        function addEntry() {
            const text = document.getElementById('entry-text').value.trim();
            const category = document.getElementById('entry-category').value;
            const date = document.getElementById('entry-date').value;
            const priority = document.getElementById('entry-priority').value;
            const notes = document.getElementById('entry-notes').value.trim();
            const recur = document.getElementById('entry-recur').value;

            if (!text || !date) return;

            state.entries.push({
                id: Date.now(), text, category, date, priority, notes, recur,
                completed: false
            });

            document.getElementById('entry-text').value = '';
            document.getElementById('entry-notes').value = '';
            save();
        }

        function toggleComplete(id) {
            const entry = state.entries.find(e => e.id === id);
            if (entry) {
                entry.completed = !entry.completed;
                if (entry.completed && entry.recur !== 'none') {
                    let next = new Date(entry.date);
                    if (entry.recur === 'daily') next.setDate(next.getDate() + 1);
                    else if (entry.recur === 'weekly') next.setDate(next.getDate() + 7);
                    else if (entry.recur === 'monthly') next.setMonth(next.getMonth() + 1);
                    
                    state.entries.push({
                        ...entry, id: Date.now() + 1,
                        date: next.toISOString().split('T')[0],
                        completed: false
                    });
                }
            }
            save();
        }

        function deleteEntry(id) {
            state.entries = state.entries.filter(e => e.id !== id);
            save();
        }

        function render() {
            const todayStr = new Date().toISOString().split('T')[0];
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const sorted = [...state.entries].sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                const pMap = { high: 0, med: 1, low: 2 };
                if (pMap[a.priority] !== pMap[b.priority]) return pMap[a.priority] - pMap[b.priority];
                return new Date(a.date) - new Date(b.date);
            });

            const filtered = sorted.filter(e => e.text.toLowerCase().includes(search) || e.category.toLowerCase().includes(search));
            const todayEntries = sorted.filter(e => e.date === todayStr);

            const total = state.entries.length;
            const completed = state.entries.filter(e => e.completed).length;
            document.getElementById('stats-done').innerText = completed;
            document.getElementById('stats-perc').innerText = total > 0 ? Math.round((completed / total) * 100) + '%' : '0%';
            document.getElementById('today-count').innerText = todayEntries.filter(e => !e.completed).length;
            document.getElementById('full-count').innerText = total;

            document.getElementById('today-list').innerHTML = todayEntries.map(e => createCard(e)).join('');
            document.getElementById('full-list').innerHTML = filtered.map(e => createCard(e)).join('');
        }

        function createCard(e) {
            const badgeKey = e.category.toLowerCase().replace('.', '').replace(' ', '');
            return `
                <div class="task-card ${e.completed ? 'completed' : ''} priority-${e.priority}">
                    <input type="checkbox" ${e.completed ? 'checked' : ''} onclick="toggleComplete(${e.id})" style="cursor:pointer;">
                    <div style="flex:1">
                        <div style="display:flex; align-items:center; gap:5px; margin-bottom: 2px;">
                            <span class="badge badge-${badgeKey}">${e.category}</span>
                            <span style="font-size: 0.55rem; color: var(--text-muted)">${e.date.split('-').reverse().slice(0,2).join('/')}</span>
                        </div>
                        <div class="task-title">${e.text}</div>
                        ${e.notes ? `<span style="font-size:0.65rem; color:var(--text-muted); display:block; margin-top:3px">${e.notes}</span>` : ''}
                    </div>
                    <button onclick="deleteEntry(${e.id})" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">✕</button>
                </div>
            `;
        }

        function exportBackup() {
            const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `omnimind_backup.json`;
            a.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.entries) {
                        state = imported;
                        save();
                        location.reload();
                    }
                } catch (err) { alert("File JSON non valido."); }
            };
            reader.readAsText(file);
        }

        window.onload = init;
    </script>
</body>
</html>
