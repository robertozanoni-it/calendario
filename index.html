<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind - Focus & Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #ffffff; 
            --bg-sidebar: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-main: #020617;
            --bg-sidebar: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-light: #1e1b4b;
            --border: #334155;
        }

        /* Badge Categories Colors */
        .badge-appti { background: #6366f1; }
        .badge-casa { background: #f59e0b; }
        .badge-disdire { background: #ef4444; }
        .badge-famiglia { background: #f97316; }
        .badge-kate { background: #a855f7; }
        .badge-lavoro { background: #3b82f6; }
        .badge-mattia { background: #ec4899; }
        .badge-pagare { background: #dc2626; }
        .badge-personale { background: #10b981; }
        .badge-riscuotere { background: #8b5cf6; }
        .badge-salute { background: #059669; }
        .badge-tel { background: #06b6d4; }
        .badge-tasse { background: #475569; }
        .badge-spesa { background: #16a34a; }
        .badge-viaggi { background: #e11d48; }
        .badge-idee { background: #ca8a04; }
        .badge-clienti { background: #2563eb; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR SINISTRA */
        .col-left {
            width: 450px;
            min-width: 380px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* AREA FOCUS DESTRA */
        .col-right {
            flex: 1;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow: hidden;
        }

        .resizer {
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
        }
        .resizer:hover { background: var(--primary); opacity: 0.3; }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.05em;
        }

        .creation-box {
            background: var(--surface);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .creation-box.editing {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-light);
        }
        
        input, select, textarea {
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 0.6rem;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.85rem;
            width: 100%;
            margin-bottom: 8px;
            outline: none;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-decoration: underline;
            border: none;
            cursor: pointer;
            margin-top: 5px;
            display: none;
            width: 100%;
            text-align: center;
        }

        /* CALENDARIO */
        .calendar-widget {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px;
            margin-bottom: 1rem;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }
        .calendar-day-head { font-size: 0.6rem; color: var(--text-muted); padding-bottom: 5px; }
        .calendar-day {
            font-size: 0.75rem;
            padding: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .calendar-day:hover { background: var(--primary-light); color: var(--primary); }
        .calendar-day.active { background: var(--primary); color: white; }
        .calendar-day.today { font-weight: 800; text-decoration: underline; }
        .calendar-day.has-tasks::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }
        .calendar-day.active.has-tasks::after { background: white; }

        /* UTILITY GRID */
        .grid-tools {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .btn-tool {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-main);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* TASK CARD */
        .task-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 10px;
            transition: all 0.2s;
        }
        .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .task-card.priority-high { border-left: 4px solid var(--danger); }
        .task-card.completed { opacity: 0.4; }

        /* ARCHIVE CATEGORY GROUP */
        .archive-group {
            margin-bottom: 1.5rem;
        }
        .archive-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .archive-group-title {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .badge { font-size: 0.6rem; font-weight: 800; color: white; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .task-title { font-weight: 700; font-size: 0.9rem; line-height: 1.3; cursor: pointer; flex: 1; }
        .task-title:hover { color: var(--primary); }

        .pill {
            white-space: nowrap;
            font-size: 0.65rem;
            padding: 4px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .repeat-badge {
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.5rem;
            padding: 2px 5px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .stats-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }
        .stat-mini {
            background: var(--surface);
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-mini .val { font-size: 1.2rem; font-weight: 800; display: block; }
        .stat-mini .lab { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Filtri Archivio */
        .archive-filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <!-- SINISTRA: INPUT & ARCHIVIO -->
        <aside class="col-left" id="sidebar">
            <header style="margin-bottom: 1rem;">
                <h1 style="font-weight: 800; color: var(--primary); font-size: 1.4rem;">OmniMind Lite</h1>
                <p id="date-display" style="font-size: 0.75rem; color: var(--text-muted);"></p>
            </header>

            <!-- Workspace: Creazione/Modifica Task -->
            <div class="creation-box" id="form-container">
                <div class="section-title" id="form-title">✨ Nuovo Task</div>
                <input type="hidden" id="task-id">
                <input type="text" id="task-text" placeholder="Cosa facciamo?">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <select id="task-cat" onchange="updateSubs()"></select>
                    <select id="task-sub"><option value="">Generale</option></select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                    <input type="date" id="task-date" onchange="syncCalendarFromInput()">
                    <select id="task-pri">
                        <option value="low">Bassa</option>
                        <option value="med">Media</option>
                        <option value="high">Alta</option>
                    </select>
                    <select id="task-repeat">
                        <option value="none">No ripetiz.</option>
                        <option value="weekly">Settimanale</option>
                        <option value="monthly">Mensile</option>
                        <option value="yearly">Annuale</option>
                    </select>
                </div>
                <button class="btn-main" id="btn-save" onclick="saveTask()">Salva</button>
                <button class="btn-cancel" id="btn-cancel" onclick="resetForm()">Annulla Modifica</button>
            </div>

            <!-- Calendario -->
            <div class="calendar-widget">
                <div class="calendar-header">
                    <button class="btn-tool" style="width:auto;" onclick="prevMonth()">‹</button>
                    <span id="month-name">Mese Anno</span>
                    <button class="btn-tool" style="width:auto;" onclick="nextMonth()">›</button>
                </div>
                <div class="calendar-grid" id="calendar-days"></div>
            </div>

            <!-- Utility -->
            <div class="grid-tools">
                <button class="btn-tool" onclick="toggleTheme()">🌓 Tema</button>
                <button class="btn-tool" onclick="exportData()">💾 Backup</button>
                <button class="btn-tool" onclick="document.getElementById('imp').click()">📂 Carica</button>
                <button class="btn-tool" onclick="window.print()">🖨️ Stampa</button>
                <input type="file" id="imp" style="display:none" onchange="importData(event)">
            </div>

            <!-- Archivio Categorizzato -->
            <div class="section-title">
                <span>📦 Archivio</span>
                <span id="count-all" class="pill">0</span>
            </div>
            
            <div class="archive-filters">
                <input type="text" id="search-box" placeholder="Cerca..." oninput="render()" style="margin-bottom:0;">
                <select id="archive-cat-filter" onchange="render()" style="margin-bottom:0;">
                    <option value="all">Tutte le Categorie</option>
                </select>
            </div>
            
            <div class="scroll-area" id="list-archive"></div>
        </aside>

        <div class="resizer" id="resizer"></div>

        <!-- DESTRA: FOCUS OGGI/DATA SELEZIONATA -->
        <main class="col-right">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <div>
                    <h2 style="font-weight: 800; font-size: 1.8rem; letter-spacing: -0.03em;">Focus Giornaliero</h2>
                    <p id="focus-date-label" style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;"></p>
                </div>
                <div style="text-align: right;">
                    <span id="count-today" style="font-size: 2rem; font-weight: 800; color: var(--primary);">0</span>
                    <p style="font-size: 0.6rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Aperti</p>
                </div>
            </div>

            <div class="scroll-area" id="list-today"></div>

            <div class="stats-footer">
                <div class="stat-mini">
                    <span class="lab">Totale Completate</span>
                    <span class="val" id="stat-done">0</span>
                </div>
                <div class="stat-mini">
                    <span class="lab">Focus Score Globale</span>
                    <span class="val" id="stat-score">0%</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const STORE_KEY = 'omnimind_v4_recurring';
        let state = { entries: [], theme: 'dark', sideWidth: 450 };

        let currentMonth = new Date();

        const CATS = {
            "App.ti": ["Visita", "Call"],
            "Casa": ["Spese", "Pulizia", "Manutenzione"],
            "Clienti": ["Fattura", "Social", "Revisione"],
            "Disdire": ["Abbonamento", "Servizio"],
            "Famiglia": ["Evento", "Ricorrenza"],
            "Idee": ["Web App", "Contenuto", "SEO"],
            "Kate": ["Task", "Memo"],
            "Lavoro": ["SEO", "Web Design", "Copywriter"],
            "Mattia": ["Scuola", "Sport"],
            "Pagare": ["Bolletta", "Fornitore"],
            "Personale": ["Hobby", "Benessere"],
            "Riscuotere": ["Credito", "Rimborso"],
            "Salute": ["Visita", "Farmacia"],
            "Spesa": ["Alimentari", "Casa"],
            "Tasse": ["IVA", "INPS", "Commercialista"],
            "Tel": ["Chiamata", "Messaggio"],
            "Viaggi": ["Prenotazione", "Itinerario"]
        };

        function init() {
            const saved = localStorage.getItem(STORE_KEY);
            if(saved) state = JSON.parse(saved);
            
            document.body.setAttribute('data-theme', state.theme);
            document.getElementById('sidebar').style.width = state.sideWidth + 'px';
            
            const todayStr = new Date().toISOString().split('T')[0];
            if(!document.getElementById('task-date').value) {
                document.getElementById('task-date').value = todayStr;
            }
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });

            const catList = Object.keys(CATS).sort();
            
            const catSel = document.getElementById('task-cat');
            catSel.innerHTML = catList.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const filterSel = document.getElementById('archive-cat-filter');
            filterSel.innerHTML = `<option value="all">Tutte le Categorie</option>` + 
                catList.map(c => `<option value="${c}">${c}</option>`).join('');
            
            setupResizer();
            updateSubs();
            renderCalendar();
            render();
        }

        // Funzione per calcolare se un task appare in una certa data (considerando ripetizioni)
        function isTaskActiveAt(task, dateStr) {
            if (task.date === dateStr) return true;
            if (task.repeat === 'none' || !task.repeat) return false;

            const tDate = new Date(task.date);
            const targetDate = new Date(dateStr);

            // Se la data di inizio è futura rispetto alla data cercata, no
            if (tDate > targetDate) return false;

            if (task.repeat === 'weekly') {
                return tDate.getDay() === targetDate.getDay();
            }
            if (task.repeat === 'monthly') {
                return tDate.getDate() === targetDate.getDate();
            }
            if (task.repeat === 'yearly') {
                return tDate.getDate() === targetDate.getDate() && tDate.getMonth() === targetDate.getMonth();
            }
            return false;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const monthName = document.getElementById('month-name');
            const selectedDate = document.getElementById('task-date').value;
            const todayStr = new Date().toISOString().split('T')[0];

            grid.innerHTML = '';
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();

            monthName.innerText = currentMonth.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });

            const daysHead = ['L', 'M', 'M', 'G', 'V', 'S', 'D'];
            daysHead.forEach(d => {
                const el = document.createElement('div');
                el.className = 'calendar-day-head';
                el.innerText = d;
                grid.appendChild(el);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div'));

            for (let day = 1; day <= lastDate; day++) {
                const dObj = new Date(year, month, day);
                const dStr = dObj.toISOString().split('T')[0];
                const el = document.createElement('div');
                el.className = 'calendar-day';
                if (dStr === todayStr) el.classList.add('today');
                if (dStr === selectedDate) el.classList.add('active');
                
                // Controllo task normali o ricorrenti
                if (state.entries.some(e => isTaskActiveAt(e, dStr))) el.classList.add('has-tasks');

                el.innerText = day;
                el.onclick = () => {
                    document.getElementById('task-date').value = dStr;
                    renderCalendar();
                    render();
                };
                grid.appendChild(el);
            }
        }

        function prevMonth() { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); }
        
        function syncCalendarFromInput() {
            const val = document.getElementById('task-date').value;
            if(val) {
                currentMonth = new Date(val);
                renderCalendar();
                render();
            }
        }

        function setupResizer() {
            const resizer = document.getElementById('resizer');
            const sidebar = document.getElementById('sidebar');
            let x = 0, w = 0;

            const onMouseMove = (e) => {
                const newW = w + (e.clientX - x);
                if(newW > 380 && newW < 800) {
                    sidebar.style.width = newW + 'px';
                    state.sideWidth = newW;
                }
            };
            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                save();
            };
            resizer.addEventListener('mousedown', (e) => {
                x = e.clientX; w = sidebar.getBoundingClientRect().width;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        function updateSubs() {
            const c = document.getElementById('task-cat').value;
            document.getElementById('task-sub').innerHTML = `<option value="">Generale</option>` + 
                (CATS[c] || []).map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function save() { 
            localStorage.setItem(STORE_KEY, JSON.stringify(state)); 
            renderCalendar(); 
            render(); 
        }

        function editTask(id) {
            const e = state.entries.find(x => x.id === id);
            if(!e) return;
            document.getElementById('task-id').value = e.id;
            document.getElementById('task-text').value = e.text;
            document.getElementById('task-cat').value = e.cat;
            updateSubs();
            document.getElementById('task-sub').value = e.sub;
            document.getElementById('task-date').value = e.date;
            document.getElementById('task-pri').value = e.pri;
            document.getElementById('task-repeat').value = e.repeat || 'none';
            document.getElementById('form-title').innerText = "✏️ Modifica Task";
            document.getElementById('btn-save').innerText = "Aggiorna";
            document.getElementById('btn-cancel').style.display = "block";
            document.getElementById('form-container').classList.add('editing');
            document.getElementById('sidebar').scrollTop = 0;
            syncCalendarFromInput();
        }

        function resetForm() {
            document.getElementById('task-id').value = '';
            document.getElementById('task-text').value = '';
            document.getElementById('task-repeat').value = 'none';
            document.getElementById('form-title').innerText = "✨ Nuovo Task";
            document.getElementById('btn-save').innerText = "Salva";
            document.getElementById('btn-cancel').style.display = "none";
            document.getElementById('form-container').classList.remove('editing');
        }

        function saveTask() {
            const text = document.getElementById('task-text').value.trim();
            if(!text) return;
            const editId = document.getElementById('task-id').value;
            const payload = {
                text,
                cat: document.getElementById('task-cat').value,
                sub: document.getElementById('task-sub').value,
                date: document.getElementById('task-date').value,
                pri: document.getElementById('task-pri').value,
                repeat: document.getElementById('task-repeat').value
            };

            if(editId) {
                const idx = state.entries.findIndex(x => x.id == editId);
                if(idx !== -1) {
                    state.entries[idx] = { ...state.entries[idx], ...payload };
                }
                resetForm();
            } else {
                state.entries.push({
                    id: Date.now(),
                    ...payload,
                    done: false
                });
                document.getElementById('task-text').value = '';
            }
            save();
        }

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', state.theme);
            save();
        }

        function render() {
            const selectedDate = document.getElementById('task-date').value;
            const search = document.getElementById('search-box').value.toLowerCase();
            const filterCat = document.getElementById('archive-cat-filter').value;
            const sorted = [...state.entries].sort((a,b) => a.done - b.done || (a.pri === 'high' ? -1 : 1));
            
            const dLabel = new Date(selectedDate).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('focus-date-label').innerText = dLabel;

            // List Focus (mostra task per la data o ricorrenti attivi)
            const todayList = sorted.filter(e => isTaskActiveAt(e, selectedDate));
            document.getElementById('list-today').innerHTML = todayList.length ? todayList.map(e => createCard(e, true, selectedDate)).join('') : '<p style="color:var(--text-muted); font-size:0.8rem; text-align:center; margin-top:2rem;">Nessun impegno per questa data.</p>';
            document.getElementById('count-today').innerText = todayList.filter(e => !e.done).length;

            // Archivio Categorizzato
            const archiveArea = document.getElementById('list-archive');
            archiveArea.innerHTML = '';
            const categories = Object.keys(CATS).sort();
            let hasResults = false;

            categories.forEach(cat => {
                if (filterCat !== 'all' && filterCat !== cat) return;
                const catTasks = sorted.filter(e => e.cat === cat && e.text.toLowerCase().includes(search));
                if (catTasks.length > 0) {
                    hasResults = true;
                    const group = document.createElement('div');
                    group.className = 'archive-group';
                    const bCls = cat.toLowerCase().replace('.','').replace(' ','');
                    const header = document.createElement('div');
                    header.className = 'archive-group-header';
                    header.innerHTML = `
                        <span class="badge badge-${bCls}">${cat}</span>
                        <span class="archive-group-title">${catTasks.length} task</span>
                    `;
                    group.appendChild(header);
                    const listContainer = document.createElement('div');
                    listContainer.innerHTML = catTasks.map(e => createCard(e, false, selectedDate)).join('');
                    group.appendChild(listContainer);
                    archiveArea.appendChild(group);
                }
            });

            if (!hasResults) archiveArea.innerHTML = '<p style="color:var(--text-muted); font-size:0.75rem; text-align:center; padding:2rem;">Nessun task trovato.</p>';

            document.getElementById('count-all').innerText = state.entries.length;
            const doneTotal = state.entries.filter(e => e.done).length;
            document.getElementById('stat-done').innerText = doneTotal;
            document.getElementById('stat-score').innerText = state.entries.length ? Math.round((doneTotal/state.entries.length)*100)+'%' : '0%';
        }

        function createCard(e, isFocus, currentViewDate) {
            const repeatIcon = e.repeat && e.repeat !== 'none' ? `<span class="repeat-badge">🔄 ${e.repeat}</span>` : '';
            return `
                <div class="task-card ${e.done ? 'completed' : ''} priority-${e.pri}">
                    <input type="checkbox" ${e.done ? 'checked' : ''} onchange="toggleDone(${e.id})" style="width:16px; height:16px; margin-top:2px; cursor:pointer;">
                    <div class="task-title" onclick="editTask(${e.id})">
                        <div style="font-size: 0.85rem;">${e.text}</div>
                        <div style="display:flex; gap:6px; align-items:center; margin-top:2px;">
                            ${repeatIcon}
                            ${e.sub ? `<span style="font-size:0.55rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">${e.sub}</span>` : ''}
                            ${!isFocus ? `<span style="font-size:0.55rem; color:var(--text-muted)">• ${e.date}</span>` : ''}
                        </div>
                    </div>
                    <button onclick="del(${e.id})" style="background:none; border:none; cursor:pointer; color:var(--text-muted); padding:4px; font-size:0.8rem;">✕</button>
                </div>
            `;
        }

        function toggleDone(id) { 
            const e = state.entries.find(x => x.id === id); 
            if(e) {
                e.done = !e.done;
                
                // Logica speciale: se un task ricorrente viene completato,
                // creiamo un'istanza futura e segniamo l'attuale come completata "storica"
                // (Oppure semplicemente spostiamo la data se vogliamo una lista pulita)
                if(e.done && e.repeat && e.repeat !== 'none') {
                    const nextDate = new Date(e.date);
                    if(e.repeat === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
                    if(e.repeat === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);
                    if(e.repeat === 'yearly') nextDate.setFullYear(nextDate.getFullYear() + 1);
                    
                    // Creiamo il nuovo task per il futuro
                    state.entries.push({
                        ...e,
                        id: Date.now() + 1,
                        date: nextDate.toISOString().split('T')[0],
                        done: false
                    });
                    
                    // Rimuoviamo la ripetizione dal task appena completato così non appare più nelle ricorrenze attive
                    e.repeat = 'none';
                }
            } 
            save(); 
        }
        
        function del(id) { 
            state.entries = state.entries.filter(x => x.id !== id); 
            if(document.getElementById('task-id').value == id) resetForm();
            save(); 
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const a = document.createElement('a'); a.setAttribute("href", dataStr);
            a.setAttribute("download", "omnimind_recurring_backup.json"); a.click();
        }

        function importData(ev) {
            const reader = new FileReader();
            reader.onload = e => { 
                try {
                    state = JSON.parse(e.target.result); 
                    save(); 
                    location.reload(); 
                } catch(err) {
                    alert("Errore nel caricamento del file.");
                }
            };
            reader.readAsText(ev.target.files[0]);
        }

        window.onload = init;
    </script>
</body>
</html>
